<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <g transform="translate(50, 48) rotate(-3)" filter="url(#shadow)">
    <!-- Stamp dark bottom (simulates 3D block) -->
    <rect x="-35" y="-31" width="70" height="70" rx="12" fill="#b87a2e"/>
    <!-- Main block -->
    <rect x="-35" y="-35" width="70" height="70" rx="12" fill="#d8923e"/>
    <!-- Emoji -->
    <text x="0" y="8" font-size="44" text-anchor="middle" dominant-baseline="middle" style="text-shadow: 1px 1px 2px rgba(0,0,0,0.2);">🎴</text>
  </g>
</svg>
